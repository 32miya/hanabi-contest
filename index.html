<style>

html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',Georgia,serif}
#c{display:block}

<body>
<canvas id="c"></canvas>
<script>
"use strict";
const C=document.getElementById('c');
const X=C.getContext('2d');
let W,H;
let SPARKLES=[];
const IS_MOBILE=('ontouchstart' in window)&&navigator.maxTouchPoints>0;
const PM=IS_MOBILE?0.62:1;
// Mobile font size: ensure at least 72% of desktop max (min 10px)
function fs(f,m){const n=Math.min(W*f,m);return IS_MOBILE?Math.max(n,Math.max(10,m*0.72)):n;}
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;initSparkles();}
window.addEventListener('resize',resize);
resize();
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const rd=Math.min(+r||0,w/2,h/2);
    this.moveTo(x+rd,y);this.arcTo(x+w,y,x+w,y+h,rd);
    this.arcTo(x+w,y+h,x,y+h,rd);this.arcTo(x,y+h,x,y,rd);
    this.arcTo(x,y,x+w,y,rd);this.closePath();
  };
}

// ── Audio ──────────────────────────────────────────────────────
let AC;
function aCtx(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function resumeAC(){const a=aCtx();if(a.state==='suspended')a.resume();}
function playLaunch(vol=0.09){
  const a=aCtx(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(130,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(1800,a.currentTime+1.9);
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.9);
  o.start();o.stop(a.currentTime+1.9);
}
function playBoom(vol=3.5){
  const a=aCtx(),len=Math.floor(a.sampleRate*1.6);
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.32);
  const src=a.createBufferSource(),lpf=a.createBiquadFilter(),g=a.createGain();
  lpf.type='lowpass';lpf.frequency.value=260;
  src.connect(lpf);lpf.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.6);
  src.buffer=buf;src.start();src.stop(a.currentTime+1.6);
}
function playCrackle(){
  for(let k=0;k<9;k++)setTimeout(()=>{
    const a=aCtx(),len=Math.floor(a.sampleRate*0.07);
    const buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const src=a.createBufferSource(),g=a.createGain();
    g.gain.value=0.2;src.connect(g);g.connect(a.destination);
    src.buffer=buf;src.start();
  },Math.random()*1600+80);
}
function playCheer(){
  const a=aCtx(),len=Math.floor(a.sampleRate*0.7);
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.6)*0.35;
  const src=a.createBufferSource(),bpf=a.createBiquadFilter(),g=a.createGain();
  bpf.type='bandpass';bpf.frequency.value=1100;bpf.Q.value=0.45;
  src.connect(bpf);bpf.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(1,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.7);
  src.buffer=buf;src.start();src.stop(a.currentTime+0.7);
}

// ── Color ──────────────────────────────────────────────────────
function lerpCol(c1,c2,t){
  const p=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
  const[r1,g1,b1]=p(c1),[r2,g2,b2]=p(c2);
  return`rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}
const TYPE_COLORS={kiku:'#ffcc44',botan:'#ff4466',yanagi:'#ddddaa',kamuro:'#ffaa00',senrin:'#aa66ff',henko:'#ff4400',
  oyanagi:'#eedd88',starmine:'#ff44ff',yashi:'#ffffbb',kaminari:'#88aaff',kowari:'#ff8833'};


// ── Background assets ──────────────────────────────────────────
const BGS=Array.from({length:230},()=>({
  x:Math.random(),y:Math.random()*0.65,r:Math.random()*1.3+0.2,
  ph:Math.random()*Math.PI*2,sp:Math.random()*0.015+0.005
}));
const WINS=Array.from({length:60},()=>({
  x:Math.random(),y:0.64+Math.random()*0.15,on:Math.random()>0.32
}));

// ── Ambient Sparkles ───────────────────────────────────────────
function mkSparkle(){
  return{x:Math.random()*W,y:Math.random()*H*0.72,
    vx:(Math.random()-0.5)*0.35,vy:-Math.random()*0.15-0.02,
    age:0,life:~~(Math.random()*220)+60,
    col:`hsl(${~~(Math.random()*60)+20},100%,${~~(Math.random()*25)+68}%)`};
}
function initSparkles(){SPARKLES=Array.from({length:IS_MOBILE?20:40},mkSparkle);}
function updateDrawSparkles(){
  for(let i=0;i<SPARKLES.length;i++){
    const s=SPARKLES[i];
    s.x+=s.vx;s.y+=s.vy;s.age++;
    if(s.age>=s.life||s.y<0)SPARKLES[i]=mkSparkle();
    const t=1-s.age/s.life,a=t*0.5*Math.abs(Math.sin(s.age*0.08));
    if(a<0.02)continue;
    X.globalAlpha=a;X.fillStyle=s.col;
    X.beginPath();X.arc(s.x,s.y,1.2,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

// ── StarParticle ───────────────────────────────────────────────
class StarParticle{
  constructor(x,y,ang,spd,colors,life,trailLen,gravMul,sNoise,lNoise,glitter){
    const sv=spd*(1+(Math.random()-0.5)*(sNoise||0));
    const lv=life*(1+(Math.random()-0.5)*(lNoise||0));
    this.x=x;this.y=y;
    this.vx=Math.cos(ang)*sv;this.vy=Math.sin(ang)*sv;
    this.cols=colors;this.life=lv;this.maxLife=lv;
    this.tl=trailLen||9;this.gm=gravMul!==undefined?gravMul:1;
    this.gl=glitter||false;this.trail=[];this.dead=false;
  }
  getCol(){
    const t=1-this.life/this.maxLife;
    if(this.cols.length===1)return this.cols[0];
    const r=t*(this.cols.length-1),i=Math.min(~~r,this.cols.length-2);
    return lerpCol(this.cols[i],this.cols[i+1],r-i);
  }
  update(g){
    this.vy+=g*this.gm;this.x+=this.vx;this.y+=this.vy;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>this.tl)this.trail.shift();
    if(--this.life<=0)this.dead=true;
  }
  draw(){
    const a=this.life/this.maxLife,col=this.getCol();
    const n=this.trail.length;
    if(n>1){
      // Dim colored full trail — thin needle streak
      X.beginPath();X.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<n;i++)X.lineTo(this.trail[i].x,this.trail[i].y);
      X.globalAlpha=a*0.42;X.strokeStyle=col;X.lineWidth=1.2;X.lineCap='round';X.stroke();
      // Bright white hot leading section (front 55%)
      const m=Math.max(0,~~(n*0.45));
      X.beginPath();X.moveTo(this.trail[m].x,this.trail[m].y);
      for(let i=m+1;i<n;i++)X.lineTo(this.trail[i].x,this.trail[i].y);
      X.globalAlpha=a*0.92;X.strokeStyle='#fff9e0';X.lineWidth=0.85;X.stroke();
    }
    // Colored halo glow around head (skip when heavy)
    if(!gHeavy&&a>0.15){
      X.globalAlpha=a*0.30;X.fillStyle=col;
      X.beginPath();X.arc(this.x,this.y,6,0,Math.PI*2);X.fill();
    }
    // Bright white spark head
    X.globalAlpha=a;
    X.fillStyle='#fff';X.beginPath();X.arc(this.x,this.y,2.1,0,Math.PI*2);X.fill();
    // Colored core dot
    X.fillStyle=col;X.beginPath();X.arc(this.x,this.y,1.1,0,Math.PI*2);X.fill();
    if(this.gl&&!gHeavy&&a>0.38&&Math.random()<0.14){
      X.globalAlpha=a*0.82;X.fillStyle='#fffff0';
      X.beginPath();X.arc(this.x,this.y,4.8,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
  }
}

// ── LightBurst ─────────────────────────────────────────────────
class LightBurst{
  constructor(x,y,typeId){
    this.x=x;this.y=y;this.life=50;this.maxLife=50;
    this.col=TYPE_COLORS[typeId]||'#ffeeaa';
    this.maxLen=Math.min(W,H)*0.38;this.dead=false;
  }
  update(){if(--this.life<=0)this.dead=true;}
  draw(){
    const t=this.life/this.maxLife,expand=1-Math.pow(1-t,2);
    const len=this.maxLen*expand,alpha=t*0.22;
    X.save();
    // Wide faint halo rays
    X.globalAlpha=alpha*0.4;X.strokeStyle=this.col;X.lineWidth=4;X.lineCap='round';
    for(let i=0;i<14;i++){
      const ang=(i/14)*Math.PI*2;
      X.beginPath();X.moveTo(this.x,this.y);
      X.lineTo(this.x+Math.cos(ang)*len,this.y+Math.sin(ang)*len);X.stroke();
    }
    // Thin bright core rays
    X.globalAlpha=alpha*1.4;X.lineWidth=1.1;
    for(let i=0;i<14;i++){
      const ang=(i/14)*Math.PI*2;
      X.beginPath();X.moveTo(this.x,this.y);
      X.lineTo(this.x+Math.cos(ang)*len,this.y+Math.sin(ang)*len);X.stroke();
    }
    X.restore();
  }
}

// ── SmokePuff ──────────────────────────────────────────────────
class SmokePuff{
  constructor(x,y,r){
    this.x=x+(Math.random()-0.5)*r;this.y=y+(Math.random()-0.5)*r*0.5;
    this.vx=(Math.random()-0.5)*0.55;this.vy=-0.45-Math.random()*0.45;
    this.r=r*(0.30+Math.random()*0.25);this.life=120+~~(Math.random()*90);
    this.maxLife=this.life;this.dead=false;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy*=0.988;this.r*=1.007;if(--this.life<=0)this.dead=true;}
  draw(){
    const t=this.life/this.maxLife;
    X.globalAlpha=t*0.12;X.fillStyle='#b8b4ae';
    X.beginPath();X.arc(this.x,this.y,this.r,0,Math.PI*2);X.fill();X.globalAlpha=1;
  }
}

// ── CameraFlash ────────────────────────────────────────────────
class CameraFlash{
  constructor(){
    this.x=W*(0.03+Math.random()*0.94);this.y=H*(0.83+Math.random()*0.05);
    this.life=18+~~(Math.random()*12);this.maxLife=this.life;this.dead=false;
  }
  update(){if(--this.life<=0)this.dead=true;}
  draw(){
    const t=this.life/this.maxLife;
    X.globalAlpha=t*0.9;X.fillStyle='#ffffff';
    X.beginPath();X.arc(this.x,this.y,t*3.5,0,Math.PI*2);X.fill();
    X.globalAlpha=t*0.55;X.strokeStyle='#fffff8';X.lineWidth=0.7;
    for(let i=0;i<4;i++){
      const ang=(i/4)*Math.PI*2;
      X.beginPath();X.moveTo(this.x+Math.cos(ang)*t*2,this.y+Math.sin(ang)*t*2);
      X.lineTo(this.x+Math.cos(ang)*t*10,this.y+Math.sin(ang)*t*10);X.stroke();
    }
    X.globalAlpha=1;
  }
}

// ── Firework types ──────────────────────────────────────────────
const FW_TYPES=[
  {id:'kiku',    name:'菊',        sub:'黄金菊'},
  {id:'botan',   name:'牡丹',      sub:'紅白牡丹'},
  {id:'yanagi',  name:'柳',        sub:'銀柳'},
  {id:'kamuro',  name:'錦冠',      sub:'黄金冠'},
  {id:'senrin',  name:'千輪',      sub:'彩色千輪'},
  {id:'henko',   name:'変色',      sub:'虹色変色'},
  {id:'oyanagi', name:'大柳',      sub:'黄金大柳'},
  {id:'starmine',name:'スターマイン',sub:'彩色連発'},
  {id:'yashi',   name:'梛子',      sub:'黄金椰子'},
  {id:'kaminari',name:'雷',        sub:'電光雷'},
  {id:'kowari',  name:'小割',      sub:'六色小割'},
];
// [最小高度比, 最大高度比] — 値が小さいほど画面上方（高い）
const FW_TARGET_H={
  kiku:     [0.07,0.16],
  botan:    [0.08,0.17],
  yanagi:   [0.10,0.20],
  kamuro:   [0.10,0.20],
  senrin:   [0.12,0.22],
  henko:    [0.08,0.18],
  oyanagi:  [0.13,0.24],
  starmine: [0.15,0.35],
  yashi:    [0.15,0.27],
  kaminari: [0.07,0.16],
  kowari:   [0.20,0.34],
};

class Firework{
  constructor(x,y,off,typeId,rings){
    this.x=x;this.y=y;this.age=0;this.done=false;
    this.stars=[];this.pending=[];
    const q=Math.max(0,1-Math.abs(off)*0.016);
    const sN=Math.max(0,(Math.abs(off)-3)*0.038),lN=Math.max(0,(Math.abs(off)-3)*0.048),eG=off*0.0018;
    const bs=H*0.0140,bl=110+q*52;
    switch(typeId){
      case'kiku':  this._kiku(x,y,q,sN,lN,eG,bs,bl,rings);break;
      case'botan': this._botan(x,y,q,sN,lN,eG,bs,bl,rings);break;
      case'yanagi':this._yanagi(x,y,q,sN,lN,eG,bs,bl);break;
      case'kamuro':this._kamuro(x,y,q,sN,lN,bs,bl);break;
      case'senrin':  this._senrin(x,y,q,sN,lN,eG,bs,bl);break;
      case'henko':   this._henko(x,y,q,sN,lN,eG,bs,bl,rings);break;
      case'oyanagi': this._oyanagi(x,y,q,sN,lN,eG,bs,bl);break;
      case'starmine':this._starmine(x,y,q,sN,lN,eG,bs,bl);break;
      case'yashi':   this._yashi(x,y,q,sN,lN,eG,bs,bl);break;
      case'kaminari':this._kaminari(x,y,q,sN,lN,eG,bs,bl);break;
      case'kowari':  this._kowari(x,y,q,sN,lN,eG,bs,bl);break;
      default:       this._kiku(x,y,q,sN,lN,eG,bs,bl,rings);
    }
  }
  _mk(x,y,ang,spd,cols,life,tl,gm,sN,lN,gl,eG){
    const s=new StarParticle(x,y,ang,spd,cols,life,tl,gm,sN,lN,gl);
    if(eG)s.vy+=eG;return s;
  }
  _kiku(x,y,q,sN,lN,eG,bs,bl,rings){
    const n=~~(88*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2,d=(1-q)*0.003*Math.sin(a);
      this.stars.push(this._mk(x,y,a+d,bs,['#ffee44','#ffaa00','#ff7700','#882200'],bl,26,1,sN,lN,true,eG));}
    if(rings>=2){const n2=~~(55*PM);for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.5,['#ffffff','#ffffcc','#eeee88'],bl*0.72,18,1,sN*.5,lN*.5,true,eG*.6));}}
    if(rings>=3){const n3=~~(32*PM);for(let i=0;i<n3;i++){const a=-Math.PI/2+(i/n3)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.27,['#ffffff','#ffeecc'],bl*0.52,9,1,sN*.2,0,false,0));}}
  }
  // 牡丹：ランダム角度でふわっと広がる球形ボール（菊の均等スポーク型とは対照的）
  _botan(x,y,q,sN,lN,eG,bs,bl,rings){
    const n=~~(108*PM);
    for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=(1-q)*0.003*Math.sin(a),sp=bs*(0.65+Math.random()*0.70);
      this.stars.push(this._mk(x,y,a+d,sp,['#ff1144','#ff5566','#ffaaaa','#ffffff'],bl,24,0.28,sN,lN,false,eG));}
    if(rings>=2){const n2=~~(65*PM);for(let i=0;i<n2;i++){const a=Math.random()*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.52,['#ff66aa','#ffaacc','#ffddee'],bl*.70,16,0.22,sN*.4,lN*.4,false,eG*.6));}}
    if(rings>=3){const n3=~~(38*PM);for(let i=0;i<n3;i++){const a=-Math.PI/2+(i/n3)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.29,['#ffffff','#ffddff'],bl*.52,6,0.18,sN*.15,0,false,0));}}
  }
  _yanagi(x,y,q,sN,lN,eG,bs,bl){
    const n=~~(78*PM),n2=~~(44*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2,d=(1-q)*0.004*Math.sin(a);
      this.stars.push(this._mk(x,y,a+d,bs*1.05,['#ffeeaa','#ffcc55','#aaa966','#555544'],bl*1.35,30,2.7,sN,lN,true,eG));}
    for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.55,['#ffffff','#ddddff','#9999bb','#444455'],bl*.72,24,2.5,sN*.5,lN*.5,true,eG*.5));}
  }
  _kamuro(x,y,q,sN,lN,bs,bl){
    const n=~~(95*PM),n2=~~(48*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2,sp=bs*(0.72+Math.random()*0.62);
      this.stars.push(this._mk(x,y,a,sp,['#ffdd00','#ffaa00','#ff7700','#884400','#221100'],bl*(0.85+Math.random()*0.3),22,3.7,sN,lN,true,0));}
    for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.45,['#ffffff','#ffffaa','#ffcc44','#443300'],bl*.62,17,3.3,sN*.6,lN*.6,true,0));}
  }
  _senrin(x,y,q,sN,lN,eG,bs,bl){
    const cfg=[
      {delay:0, n:~~(45*PM),spd:bs*0.32,cols:['#ff2233','#ff8844','#ffeeaa'],life:bl*0.85},
      {delay:14,n:~~(50*PM),spd:bs*0.54,cols:['#3366ff','#88bbff','#ffffff'],life:bl*0.90},
      {delay:28,n:~~(55*PM),spd:bs*0.72,cols:['#44dd77','#aaffcc','#ffffff'],life:bl*0.95},
      {delay:42,n:~~(55*PM),spd:bs*0.88,cols:['#dd44ff','#ff99ee','#ffffff'],life:bl*1.00},
      {delay:56,n:~~(60*PM),spd:bs*1.03,cols:['#ffcc00','#ff8800','#ff4400','#ffffff'],life:bl*0.95},
    ];
    cfg.forEach(rc=>{
      const list=[];
      for(let i=0;i<rc.n;i++){const a=-Math.PI/2+(i/rc.n)*Math.PI*2,d=(1-q)*0.003*Math.sin(a);
        list.push(this._mk(x,y,a+d,rc.spd,rc.cols,rc.life,14,0.9,sN*.6,lN*.6,false,eG));}
      if(rc.delay===0)this.stars.push(...list);
      else this.pending.push({t:rc.delay,list});
    });
  }
  _henko(x,y,q,sN,lN,eG,bs,bl,rings){
    const n=~~(85*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2,d=(1-q)*0.003*Math.sin(a);
      this.stars.push(this._mk(x,y,a+d,bs,['#ff2200','#ff8800','#ffff00','#ffffff','#88aaff','#4466cc'],bl*1.1,24,1,sN,lN,false,eG));}
    if(rings>=2){const n2=~~(55*PM);for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.50,['#0044ff','#4499ff','#88ccff','#ffffff','#ffccff'],bl*.74,18,1,sN*.5,lN*.5,false,eG*.6));}}
    if(rings>=3){const n3=~~(35*PM);for(let i=0;i<n3;i++){const a=-Math.PI/2+(i/n3)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*0.28,['#ffff00','#ffffff','#ccffff'],bl*.53,9,0.9,sN*.15,0,false,0));}}
  }
  // 大柳：上方噴出し重力で急落下する金色大瀑布（柳の均等球形とは異なる噴水型）
  _oyanagi(x,y,q,sN,lN,eG,bs,bl){
    const n=~~(130*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(Math.random()-0.5)*Math.PI*1.7,sp=bs*(0.9+Math.random()*0.85);
      this.stars.push(this._mk(x,y,a,sp,['#fffacc','#ffee99','#ddbb55','#aa8833','#664411','#332200'],bl*2.0,32,5.5,sN*.8,lN*.7,true,eG));}
    const n2=~~(70*PM);
    for(let i=0;i<n2;i++){const a=-Math.PI/2+(Math.random()-0.5)*Math.PI*1.9,sp=bs*(0.48+Math.random()*0.42);
      this.stars.push(this._mk(x,y,a,sp,['#ffffff','#ffffee','#ddddaa','#aa8844','#554433'],bl*1.55,28,4.8,sN*.5,lN*.5,true,eG*.5));}
    const n3=~~(32*PM);
    for(let i=0;i<n3;i++){const a=-Math.PI/2+(Math.random()-0.5)*Math.PI*1.4;
      this.stars.push(this._mk(x,y,a,bs*0.30,['#ffffff','#ffffcc'],bl*0.9,18,3.5,sN*.2,0,false,eG*.3));}
  }
  // スターマイン：8色連続爆発
  _starmine(x,y,q,sN,lN,eG,bs,bl){
    const stages=[
      {d:0, r:0.55,cols:['#ff2200','#ff6600','#ffaa00']},
      {d:10,r:0.64,cols:['#0055ff','#44aaff','#ffffff']},
      {d:20,r:0.72,cols:['#ff0099','#ff66dd','#ffffff']},
      {d:30,r:0.80,cols:['#00cc44','#55ff99','#aaffcc']},
      {d:40,r:0.88,cols:['#ffcc00','#ffee66','#ffffff']},
      {d:50,r:0.95,cols:['#cc00ff','#ee77ff','#ffffff']},
      {d:60,r:1.02,cols:['#ff6600','#ffcc44','#ffffcc']},
      {d:70,r:1.12,cols:['#ffffff','#ffeecc','#ffcc88','#ff8844']},
    ];
    stages.forEach(s=>{
      const n=~~(32*PM),list=[];
      for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2,d=(1-q)*0.003*Math.sin(a);
        list.push(this._mk(x,y,a+d,bs*s.r,s.cols,bl*0.72,10,0.88,sN*.5,lN*.4,true,eG));}
      if(s.d===0)this.stars.push(...list);
      else this.pending.push({t:s.d,list});
    });
  }
  // 梛子(椰子)：上半球に広がる金棕櫚
  _yashi(x,y,q,sN,lN,eG,bs,bl){
    const n=~~(90*PM);
    for(let i=0;i<n;i++){
      const t=i/n;
      const a=-Math.PI+t*Math.PI; // 上半球 -π〜0
      const spd=bs*(0.95+0.4*Math.abs(Math.cos(a))); // 真上ほど速い
      this.stars.push(this._mk(x,y,a+(1-q)*0.002*Math.sin(t*8),spd,
        ['#ffffcc','#ffee99','#ccaa44','#886633','#443311'],bl*1.55,28,4.2,sN*.5,lN*.4,true,eG));}
    const n2=~~(18*PM);
    for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2-0.5)*0.5;
      this.stars.push(this._mk(x,y,a,bs*1.3,['#ffffff','#ffffaa'],bl*0.72,20,2.8,0.08,0,true,eG));}
  }
  // 雷：電光閃光クラッカー
  _kaminari(x,y,q,sN,lN,eG,bs,bl){
    const n=~~(75*PM);
    for(let i=0;i<n;i++){const a=-Math.PI/2+(i/n)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*(0.8+Math.random()*0.9),['#ffffff','#eeeeff','#88aaff','#4466dd','#ffffff'],bl*0.82,20,0.32,0.5,0.3,true,eG));}
    // 閃光リング
    const fl1=[],n2=~~(55*PM);
    for(let i=0;i<n2;i++){const a=-Math.PI/2+(i/n2)*Math.PI*2;
      fl1.push(this._mk(x,y,a,bs*1.85,['#ffffff','#ccddff'],bl*0.28,2,0.08,0.12,0,true,0));}
    this.pending.push({t:3,list:fl1});
    // 第2クラッカー
    const fl2=[],n3=~~(48*PM);
    for(let i=0;i<n3;i++){const a=-Math.PI/2+(i/n3)*Math.PI*2+0.1;
      fl2.push(this._mk(x,y,a,bs*1.1,['#aabbff','#ffffff','#6688ff'],bl*0.56,4,0.22,0.55,0.22,true,0));}
    this.pending.push({t:10,list:fl2});
    // 第3クラッカー
    const fl3=[],n4=~~(40*PM);
    for(let i=0;i<n4;i++){const a=-Math.PI/2+(i/n4)*Math.PI*2-0.07;
      fl3.push(this._mk(x,y,a,bs*0.72,['#ffffff','#9999ff','#ffffff'],bl*0.44,3,0.38,0.6,0.28,false,0));}
    this.pending.push({t:18,list:fl3});
  }
  // 小割：中心から6色小爆発
  _kowari(x,y,q,sN,lN,eG,bs,bl){
    const n0=~~(24*PM);
    for(let i=0;i<n0;i++){const a=-Math.PI/2+(i/n0)*Math.PI*2;
      this.stars.push(this._mk(x,y,a,bs*1.6,['#ffffff','#ffeecc'],bl*0.22,3,1.1,0.1,0,false,0));}
    const subR=H*0.038;
    [{cols:['#ff3300','#ff7700','#ffbb00']},{cols:['#0044ff','#44aaff','#aaccff']},
     {cols:['#ff0077','#ff55aa','#ffffff']},{cols:['#00bb44','#44ff88','#aaffcc']},
     {cols:['#ffaa00','#ffee44','#ffffff']},{cols:['#8800ff','#cc55ff','#eeccff']}
    ].forEach((sc,si)=>{
      const sa=-Math.PI/2+(si/6)*Math.PI*2;
      const sx=x+Math.cos(sa)*subR,sy=y+Math.sin(sa)*subR;
      const subN=~~(26*PM),subList=[];
      for(let i=0;i<subN;i++){const a=-Math.PI/2+(i/subN)*Math.PI*2;
        subList.push(this._mk(sx,sy,a,bs*0.52,sc.cols,bl*0.7,10,0.92,sN*.6,lN*.5,false,eG));}
      this.pending.push({t:20+si*5,list:subList});
    });
  }
  update(){
    this.age++;
    this.pending=this.pending.filter(p=>{if(--p.t<=0){this.stars.push(...p.list);return false;}return true;});
    this.stars.forEach(s=>s.update(0.036));
    this.stars=this.stars.filter(s=>!s.dead);
    if(this.stars.length===0&&this.pending.length===0)this.done=true;
  }
  draw(){
    this.stars.forEach(s=>s.draw());
    // Bloom: additive-blend hot-spots where stars cluster (lighter = HDR glow)
    if(!gHeavy&&this.stars.length>0){
      X.save();X.globalCompositeOperation='lighter';
      this.stars.forEach(s=>{const a=s.life/s.maxLife;if(a<0.2)return;
        X.globalAlpha=a*0.09;X.fillStyle=s.getCol();
        X.beginPath();X.arc(s.x,s.y,9,0,Math.PI*2);X.fill();});
      X.restore();X.globalAlpha=1;
    }
    // Center glow: instant flash then slow-fade lingering core
    if(this.age<=48){
      let r,rad;
      if(this.age<=10){r=(10-this.age)/10;rad=H*0.13*r;}
      else{r=Math.pow(1-(this.age-10)/38,2)*0.42;rad=H*0.075*r;}
      if(r>0.01){
        const grd=X.createRadialGradient(this.x,this.y,0,this.x,this.y,rad);
        grd.addColorStop(0,'rgba(255,255,255,1)');
        grd.addColorStop(0.28,'rgba(255,240,140,0.75)');
        grd.addColorStop(1,'rgba(255,150,10,0)');
        X.globalAlpha=r*0.90;X.fillStyle=grd;
        X.beginPath();X.arc(this.x,this.y,rad,0,Math.PI*2);X.fill();
        X.globalAlpha=1;
      }
    }
  }
}

// ── FinaleRocket ───────────────────────────────────────────────
class FinaleRocket{
  constructor(x,typeId,rings,delay){
    this.delay=delay||0;this.started=false;this.exploded=false;
    this.x=x+(Math.random()-0.5)*22;this.y=H*0.87;this.g=0.13;
    this.typeId=typeId||FW_TYPES[~~(Math.random()*FW_TYPES.length)].id;
    const[tyLo,tyHi]=FW_TARGET_H[this.typeId]||[0.07,0.23];
    const ty=H*(tyLo+Math.random()*(tyHi-tyLo));
    this.vy=-Math.sqrt(2*this.g*(this.y-ty));
    this.trail=[];this.frame=0;
    this.peakFrame=Math.round(-this.vy/this.g);
    this.rings=rings||3;this.dead=false;
  }
  get offset(){return this.frame-this.peakFrame;}
  get nearPeak(){return this.started&&!this.exploded&&Math.abs(this.offset)<=7;}
  update(){
    if(this.delay>0){this.delay--;return;}
    if(!this.started){this.started=true;if(Math.random()<0.45)playLaunch(0.04);}
    this.vy+=this.g;this.y+=this.vy;this.frame++;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>18)this.trail.shift();
    if(this.offset<-4&&!gHeavy&&Math.random()<0.18)smokes.push(new SmokePuff(this.x,this.y,H*0.014));
    // 乗り遅れ安全網：ピーク+55フレーム過ぎたら自動爆発
    if(!this.exploded&&this.started&&this.offset>55)explodeFinaleRocket(this);
  }
  draw(){
    if(!this.started)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],p=i/this.trail.length;
      X.globalAlpha=p*0.75;X.beginPath();X.arc(t.x,t.y,2.2*p,0,Math.PI*2);
      X.fillStyle=`hsl(${30+p*20},100%,${55+p*35}%)`;X.fill();
    }
    X.globalAlpha=1;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,12);
    g.addColorStop(0,'rgba(255,240,130,0.9)');g.addColorStop(1,'rgba(255,60,0,0)');
    X.fillStyle=g;X.beginPath();X.arc(this.x,this.y,12,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';X.beginPath();X.arc(this.x,this.y,3.2,0,Math.PI*2);X.fill();
    if(this.nearPeak){
      const pulse=0.5+0.5*Math.sin(fr*0.3);
      X.save();X.globalAlpha=pulse*0.7;X.strokeStyle='#ffff33';X.lineWidth=1.8;
      if(!IS_MOBILE){X.shadowColor='#ffff44';X.shadowBlur=8;}
      X.beginPath();X.arc(this.x,this.y,18+pulse*4,0,Math.PI*2);X.stroke();
      X.restore();
    }
  }
}

// ── Scoring ────────────────────────────────────────────────────
function calcScore(off){
  const o=Math.abs(off),rng=n=>~~(Math.random()*n)-~~(n/2);
  // 緩やかな得点曲線: off<=7（表示リング内）で65+/100点を保証
  const suwari=Math.max(0,Math.min(30,
    o<=1?30:o<=7?~~(30-(o-1)*1.6):o<=18?~~(21-(o-7)*1.2):Math.max(0,~~(7.8-(o-18)*0.4))
  ))+(o<=8?rng(3):0);
  const bon=Math.max(0,Math.min(30,
    o<=2?29+rng(2):o<=7?~~(29-(o-2)*1.8)+rng(2):o<=18?~~(20-(o-7)*1.1)+rng(2):Math.max(0,~~(9-(o-18)*0.5))
  ));
  const kata=Math.max(0,Math.min(20,
    o<=2?19+rng(2):o<=7?~~(19-(o-2)*1.2)+rng(2):o<=18?~~(13-(o-7)*0.65)+rng(2):Math.max(0,~~(4.8-(o-18)*0.2))
  ));
  const kieguchi=Math.max(0,Math.min(20,
    o<=2?19+rng(2):o<=7?~~(19-(o-2)*1.2)+rng(2):o<=18?~~(13-(o-7)*0.70)+rng(2):Math.max(0,~~(4.5-(o-18)*0.25))
  ));
  return{suwari,bon,kata,kieguchi,total:suwari+bon+kata+kieguchi,offset:off};
}

// ── Input ──────────────────────────────────────────────────────
function onInput(){
  resumeAC();
  if(state==='TITLE'){fws=[];lightBursts=[];titleT=0;stageScores=[];initStage(0);return;}
  if(state==='WAITING'){
    const cands=rockets.filter(r=>r.launched&&!r.exploded);
    if(cands.length>0){
      const best=cands.reduce((a,b)=>Math.abs(a.offset)<Math.abs(b.offset)?a:b);
      onRocketExplode(best);
    }
    return;
  }
  if(state==='FINALE'){
    const cands=finaleRockets.filter(r=>r.started&&!r.exploded&&!r.grand);
    if(cands.length>0){
      const best=cands.reduce((a,b)=>Math.abs(a.offset)<Math.abs(b.offset)?a:b);
      explodeFinaleRocket(best);
    }
    return;
  }
  if(state==='FRENZY'&&!frenzyPhaseEnd){
    // コンボ更新（毎タップ）
    const tapAge=fr-frenzyLastTap;
    if(frenzyLastTap>0&&tapAge<=40)frenzyCombo=Math.min(frenzyCombo+1,80);
    else frenzyCombo=Math.max(0,frenzyCombo-4);
    frenzyLastTap=fr;
    // タップチャージ: 発数に応じて必要タップ数が増加
    const tapRequired=frenzyTotalFired>=1500?4:frenzyTotalFired>=1000?3:frenzyTotalFired>=500?2:1;
    frenzyTapCharge++;
    crowdCheer=100;
    if(frenzyTapCharge>=tapRequired){
      frenzyTapCharge=0;
      const rpt=Math.min(8,1+~~(frenzyCombo/8));
      const safeRpt=ptCount>(IS_MOBILE?800:2500)?Math.min(rpt,2):rpt;
      const prevTot=frenzyTotalFired;
      for(let i=0;i<safeRpt;i++){
        frenzyRockets.push(new FinaleRocket(W*(0.04+Math.random()*0.92),
          FW_TYPES[~~(Math.random()*FW_TYPES.length)].id,~~(Math.random()*2)+1,i*4));
        frenzyTotalFired++;
      }
      skyGlow=Math.min(1,skyGlow+0.06);
      const mils=[50,100,200,300,500,1000,1500];
      if(mils.some(m=>prevTot<m&&frenzyTotalFired>=m)){
        colorFlash=100;colorFlashCol='#ffffff';shakeAmt=Math.max(shakeAmt,34);
        if(boomCd<=0){playBoom(6.0);boomCd=12;}playCrackle();
      }
    }
    return;
  }
  if(state==='SCORING'&&scPh>=maxScPhase()){advanceFromScore();return;}
  if(state==='REPLAY'){state='TITLE';fws=[];lightBursts=[];smokes=[];crowdReacts=[];cameraFlashes=[];titleT=0;return;}
  if(state==='RESULTS'){if(replayLog.length>0){startReplay();return;}state='TITLE';fws=[];lightBursts=[];smokes=[];crowdReacts=[];titleT=0;return;}
}

// ── Game logic ─────────────────────────────────────────────────
function initStage(idx){
  stageIdx=idx;const cfg=STAGE_CFG[idx];
  shotScores=[];rockets=[];combo=0;
  if(idx===0){newRecord=false;frenzyTotalFired=0;frenzyRockets=[];frenzyPhaseEnd=false;frenzyTapCharge=0;replayLog=[];recordingFrame=0;}
  const pool=cfg.pool?[...cfg.pool]:FW_TYPES.map(t=>t.id);
  shuffle(pool);shotTypes=pool.slice(0,cfg.shots);
  launchT=160;state='LAUNCHING';
}
function doLaunch(){
  const cfg=STAGE_CFG[stageIdx];
  const xSp=i=>(i-(cfg.shots-1)/2)*W*0.15;
  rockets=shotTypes.map((typeId,i)=>new Rocket(xSp(i),i*15,typeId,cfg.rings));
  state='WAITING';
}
function addReact(sc,rx){

function onRocketExplode(r){
  if(r.exploded)return;
  r.exploded=true;
  const off=r.offset;
  fws.push(new Firework(r.x,r.y,off,r.typeId,r.rings));
  playBoom();playCrackle();
  const sc=calcScore(off);
  if(Math.abs(off)<=5)combo++;else combo=0;
  if(combo>=2)comboPops.push({x:r.x,y:r.y-28,t:85,
    txt:combo>=5?`${combo}連続 大コンボ！`:combo>=3?`${combo}連続コンボ！`:`${combo}連続！`,
    col:combo>=5?'#ff8800':combo>=3?'#ffdd22':'#ffee88',sz:fs(0.038,26)});
  shotScores.push(sc);
  crowdCheer=Math.max(crowdCheer,(sc.total-40)/60*100);
  shakeAmt=Math.min(10,2+sc.total*0.05);
  skyGlow=Math.min(1,skyGlow+0.20);
  lightBursts.push(new LightBurst(r.x,r.y,r.typeId));
  for(let k=0;k<~~(13*PM);k++)smokes.push(new SmokePuff(r.x,r.y,H*0.07));
  addReact(sc.total,r.x);
  colorFlash=20;colorFlashCol=TYPE_COLORS[r.typeId]||'#ffeeaa';
  boomCd=Math.max(boomCd,8);
  if(rockets.every(r2=>r2.exploded)){state='EXPLODING';scT=140;}
}
function explodeFinaleRocket(r){

  fws.push(new Firework(r.x,r.y,off,r.typeId,capRings));
  lightBursts.push(new LightBurst(r.x,r.y,r.typeId));
  for(let k=0;k<~~(10*PM);k++)smokes.push(new SmokePuff(r.x,r.y,H*0.06));
  colorFlash=14;colorFlashCol=TYPE_COLORS[r.typeId]||'#ffeeaa';
  if(boomCd<=0){playBoom(2.0);boomCd=7;}
  if(Math.random()<0.4)playCrackle();
  shakeAmt=Math.max(shakeAmt,6);skyGlow=Math.min(1,skyGlow+0.22);crowdCheer=100;
  const sc=calcScore(off);
  if(Math.abs(off)<=5)combo++;else combo=0;

    txt:combo>=5?`${combo}連続 大コンボ！`:combo>=3?`${combo}連続コンボ！`:`${combo}連続！`,
    col:combo>=5?'#ff8800':combo>=3?'#ffdd22':'#ffee88',sz:fs(0.038,26)});

function drawCrowd(){
  const by=H*0.878,sp=W/58,ch=Math.min(1,crowdCheer/100);
  X.fillStyle='#010308';
  for(let i=0;i<58;i++){
    const cx=(i+0.5)*sp,jt=Math.sin(i*5.7+fr*0.006)*3+Math.sin(i*2.1)*2;
    const cb=ch?Math.sin(fr*0.18+i*0.8)*ch*7:0,hy=by+jt+cb;
    X.beginPath();X.arc(cx,hy,sp*0.37,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx,hy+sp*0.48,sp*0.28,0,Math.PI*2);X.fill();
    if((i%7===0||i%11===0)||(ch>0.4&&i%4===0)||(ch>0.8&&i%2===0)){
      const sd=i%2===0?1:-1,lift=ch>0.7?sp*1.3:sp*0.85;
      X.beginPath();X.moveTo(cx,hy);X.lineTo(cx+sd*sp*0.55,hy-lift);
      X.strokeStyle='#010308';X.lineWidth=sp*0.18;X.stroke();
    }
  }
  X.fillStyle='#010208';X.fillRect(0,H*0.925,W,H*0.075);
  for(let i=0;i<8;i++){
    const lx=(i/7)*W,ly=H*0.883,p=0.6+0.4*Math.abs(Math.sin(fr*0.03+i));
    X.globalAlpha=p*0.8;X.fillStyle='#ff9922';

  }
  X.globalAlpha=1;if(crowdCheer>0)crowdCheer*=0.982;
}

  txt('花火が上がったらタップで爆発！',W/2,H*0.54,fs(0.034,22),'rgba(255,200,100,0.9)','center',8);
  X.globalAlpha=flash*0.55;
  txt('タイミングが得点に影響します',W/2,H*0.62,fs(0.024,16),'rgba(255,220,150,0.75)','center',4);
  X.globalAlpha=1;
}

function uiFinale(){
  finaleTimer++;boomCd=Math.max(0,boomCd-1);
  while(finaleWave<FINALE_WAVES.length&&finaleTimer>=FINALE_WAVES[finaleWave].t){
    const wv=FINALE_WAVES[finaleWave];
    wv.rockets.forEach(rc=>{
      finaleRockets.push(new FinaleRocket(W*rc.xp,FW_TYPES[~~(Math.random()*FW_TYPES.length)].id,wv.rings,rc.d));
    });
    finaleWave++;
  }
  // 大締め：全ランダム花火が終わったら中央から三重芯の大尺玉を1発
  if(!finaleCloseFired&&finaleTimer>=700&&finaleRockets.length===0){
    const gr=new FinaleRocket(W*0.5,'kiku',3,0);
    gr.grand=true;finaleRockets.push(gr);finaleCloseFired=true;
  }
  X.globalAlpha=(0.4+0.6*Math.abs(Math.sin(fr*0.04)))*0.8;
  txt('大フィナーレ！',W/2,H*0.08,fs(0.04,28),'#ffcc44','center',10);
  X.globalAlpha=1;
  // タップ促進（大締め中は非表示）
  const active=finaleRockets.filter(r=>r.started&&!r.exploded&&!r.grand);
  if(active.length>0){
    const anyNear=active.some(r=>r.nearPeak);
    const anyUrgent=active.some(r=>Math.abs(r.offset)<=3);
    const p=anyUrgent?1:0.6+0.4*Math.abs(Math.sin(fr*0.13));
    const col=anyUrgent?'#ffff33':anyNear?'#ffee66':'rgba(255,220,140,0.85)';
    X.globalAlpha=p;
    const _fw=Math.min(320,W*0.86);
    X.fillStyle='rgba(0,0,0,0.45)';X.fillRect(W/2-_fw/2,H*0.87-16,_fw,32);
    txt('▶  タ ッ プ で 爆 発 ！  ◀',W/2,H*0.87,fs(0.028,20),col,'center',anyUrgent?10:0);
    X.globalAlpha=1;
  }
  // フィナーレ得点
  if(finaleShots.length>0){
    const favg=Math.round(finaleShots.reduce((a,s)=>a+s.total,0)/finaleShots.length);
    txt(`フィナーレ ${finaleShots.length}発　平均 ${favg}点`,W/2,H*0.13,fs(0.018,13),'rgba(180,220,255,0.7)');
  }
  const _stageTot=stageScores.reduce((a,s)=>a+s.avg,0);
  const _unlock=_stageTot>=220; // 花火名人以上でFRENZY解放
  if(finaleTimer>FINALE_END&&finaleRockets.length===0&&fws.length===0){
    if(_unlock){state='FRENZY_INTRO';frenzyIntroT=90;}else{state='RESULTS';}return;
  }
  else if(finaleTimer>FINALE_END+360){
    if(_unlock){state='FRENZY_INTRO';frenzyIntroT=90;}else{state='RESULTS';}
  }
}

function uiFrenzyIntro(){
  frenzyIntroT--;
  if(frenzyIntroT<=0){startFrenzy();return;}
  const t=frenzyIntroT/90,flash=t>0.85?(1-t)*6:1;
  X.fillStyle=`rgba(0,0,5,${t*0.55})`;X.fillRect(0,0,W,H);
  X.globalAlpha=flash;
  txt('連打クライマックス！',W/2,H*0.39,fs(0.092,54),'#ff4400','center',22);
  X.globalAlpha=flash*0.75;
  txt('タップ連打で花火を増やせ！',W/2,H*0.52,fs(0.034,22),'rgba(255,180,80,0.9)','center',8);
  X.globalAlpha=flash*0.55;
  txt('コンボが続くほど打ち上げ数が増える！',W/2,H*0.60,fs(0.024,16),'rgba(255,220,150,0.75)','center',4);
  X.globalAlpha=1;
}

function uiFrenzy(){
  frenzyTimer++;boomCd=Math.max(0,boomCd-1);
  // Combo decay (per frame when not tapping)
  if(fr-frenzyLastTap>40&&frenzyCombo>0)frenzyCombo=Math.max(0,frenzyCombo-1.0);
  const remaining=Math.max(0,FRENZY_DURATION-frenzyTimer);
  if(remaining<=0)frenzyPhaseEnd=true;
  // End condition
  if(frenzyPhaseEnd&&frenzyRockets.length===0){state='RESULTS';return;}
  if(frenzyTimer>FRENZY_DURATION+300){state='RESULTS';return;}
  // Header label
  X.globalAlpha=(0.45+0.55*Math.abs(Math.sin(fr*0.04)))*0.9;
  txt('連打クライマックス！',W/2,H*0.08,fs(0.04,26),'#ff4400','center',10);X.globalAlpha=1;
  // Big fired count — pulses faster as count climbs
  const pulse=1+0.04*Math.abs(Math.sin(fr*(0.2+frenzyTotalFired*0.0006)));
  const countSz=IS_MOBILE?Math.min(W*0.18,78):Math.min(W*0.12,88);
  const fireSt=frenzyTotalFired>=1500?'#cc00ff':frenzyTotalFired>=1000?'#ff0000':frenzyTotalFired>=500?'#ff6600':frenzyTotalFired>=100?'#ff9900':'#ffee22';
  X.save();X.translate(W/2,H*0.22);X.scale(pulse,pulse);
  txt(`${frenzyTotalFired}発！`,0,0,countSz,fireSt,'center',24);X.restore();
  // Combo multiplier badge
  const rpt=Math.min(8,1+~~(frenzyCombo/8));
  if(rpt>1){
    const comboCol=rpt>=7?'#ff2200':rpt>=5?'#ff8800':rpt>=3?'#ffcc00':'#ffee88';
    txt(`×${rpt} コンボ`,W/2,H*0.13,fs(0.045,28),comboCol,'center',12);
  }
  // タップチャージインジケーター
  const tapRequired=frenzyTotalFired>=1500?4:frenzyTotalFired>=1000?3:frenzyTotalFired>=500?2:1;
  if(tapRequired>1){
    const dots=Array.from({length:tapRequired},(_,i)=>i<frenzyTapCharge?'●':'○').join('');
    const tierCol=tapRequired>=4?'#cc44ff':tapRequired>=3?'#ff4400':'#ff8800';
    txt(`${dots}　${tapRequired}タップで1発`,W/2,H*0.32,fs(0.032,20),tierCol,'center',8);
  }
  // Countdown bar
  const barW=Math.min(200,W*0.48),bx=W/2-barW/2,by=H*0.05;
  X.globalAlpha=0.6;X.fillStyle='#111';X.fillRect(bx,by,barW,7);
  X.fillStyle=remaining<360?'#ff3300':remaining<600?'#ff8800':'#ffaa00';
  X.fillRect(bx,by,barW*(remaining/FRENZY_DURATION),7);X.globalAlpha=1;
  const secs=Math.ceil(remaining/60);
  txt(`残り${secs}秒`,W*0.80,H*0.057,fs(0.02,14),'rgba(255,160,60,0.75)','center');
  if(!frenzyPhaseEnd){
    const p=0.65+0.35*Math.abs(Math.sin(fr*0.16));
    X.globalAlpha=p;
    const _bw=Math.min(340,W*0.90);
    X.fillStyle='rgba(0,0,0,0.50)';X.fillRect(W/2-_bw/2,H*0.85-18,_bw,36);
    const tapHint=tapRequired>1?`${tapRequired}タップで1発！　連打！`:'▶　タップ連打！　コンボを続けろ！　◀';
    txt(tapHint,W/2,H*0.85,fs(0.032,22),tapRequired>1?'#ff8800':'#ff5500','center',14);
    X.globalAlpha=1;
  } else {
    txt('フレンジー終了！',W/2,H*0.85,fs(0.05,30),'#ffcc44','center',14);
  }
  // Milestone white-sky overlay (フラッシュ)
  if(colorFlash>60){
    X.save();X.globalCompositeOperation='lighter';
    X.globalAlpha=(colorFlash-60)/40*0.18;X.fillStyle='#ffffff';X.fillRect(0,0,W,H);
    X.restore();X.globalAlpha=1;
  }
}

function uiReplay(){
  replayTimer++;boomCd=Math.max(0,boomCd-1);
  // Spawn recorded events
  while(replayCursor<replayLog.length&&replayLog[replayCursor].t<=replayTimer){
    const ev=replayLog[replayCursor++];
    if(ptCount<(IS_MOBILE?800:2500))fws.push(new Firework(ev.x,ev.y,0,ev.typeId,ev.rings));
    lightBursts.push(new LightBurst(ev.x,ev.y,ev.typeId));
    if(smokes.length<280)for(let k=0;k<~~(4*PM);k++)smokes.push(new SmokePuff(ev.x,ev.y,H*0.06));
    colorFlash=14;colorFlashCol=TYPE_COLORS[ev.typeId]||'#ffeeaa';
    if(boomCd<=0){playBoom(ev.grand?5.0:1.8);boomCd=ev.grand?14:5;}
    if((ev.sc>0||ev.grand)&&Math.random()<0.45)playCrackle();
    shakeAmt=Math.max(shakeAmt,ev.grand?20:5);
    skyGlow=Math.min(1,skyGlow+(ev.grand?0.4:0.14));
    crowdCheer=100;
    if(ev.sc>=60||ev.grand){
      const nc=ev.grand?8:~~(2+Math.random()*4);
      for(let i=0;i<nc;i++)cameraFlashes.push(new CameraFlash());
      if(ev.sc>=80||ev.grand)playCheer();
    }
  }
  // Camera flashes from audience
  cameraFlashes.forEach(f=>{f.update();f.draw();});
  cameraFlashes=cameraFlashes.filter(f=>!f.dead);
  // Cinematic letterbox bars
  const barH=H*0.09;
  X.fillStyle='#000';
  X.fillRect(0,0,W,barH);X.fillRect(0,H-barH,W,barH);
  // REPLAY badge (top-left)
  X.fillStyle='rgba(188,0,0,0.88)';
  X.beginPath();X.roundRect(10,barH+7,66,22,4);X.fill();
  txt('● REPLAY',43,barH+18,11,'#fff','center');
  // Progress bar (top-center)
  const lastT=replayLog.length>0?replayLog[replayLog.length-1].t:300;
  const endT=lastT+180;
  const pbw=Math.min(150,W*0.28),pbx=W/2-pbw/2,pby=barH+10;
  X.globalAlpha=0.55;X.fillStyle='#222';X.fillRect(pbx,pby,pbw,5);
  X.globalAlpha=1;X.fillStyle='#ff6622';X.fillRect(pbx,pby,pbw*Math.min(1,replayTimer/endT),5);
  // Total fired count (top-right)
  if(frenzyTotalFired>0)
    txt(`${frenzyTotalFired}発`,W-12,barH+18,fs(0.022,15),'rgba(255,160,60,0.9)','right',4);
  // Bottom letterbox caption + skip hint
  const cp=0.65+0.35*Math.abs(Math.sin(fr*0.045));
  X.globalAlpha=cp;
  txt('あなたがプロデュースした花火大会',W/2,H-barH*0.58,fs(0.022,15),'rgba(255,215,130,0.92)','center',4);
  X.globalAlpha=0.38+0.28*Math.abs(Math.sin(fr*0.09));
  txt(IS_MOBILE?'タップでスキップ':'クリック / スペースでスキップ',W/2,H-barH*0.18,fs(0.015,11),'rgba(200,175,110,0.7)');
  X.globalAlpha=1;
  // Completion check
  if(replayTimer>endT+360||(replayCursor>=replayLog.length&&fws.length===0&&replayTimer>180)){
    state='TITLE';fws=[];lightBursts=[];smokes=[];crowdReacts=[];cameraFlashes=[];titleT=0;
  }
}

function uiResults(){
  const stageTot=stageScores.reduce((a,s)=>a+s.avg,0);
  if(!newRecord&&stageTot>hiscore){hiscore=stageTot;localStorage.setItem('hanabi_hiscore',hiscore);newRecord=true;}
  let grade,gc,gsub;
  if(stageTot>=270){grade='花火の神';gc='#fff';    gsub='神業！　完璧なタイミング！';}
  else if(stageTot>=220){grade='花火名人';gc='#ffee22';gsub='名人の域！　頂点を射抜く腕前';}
  else if(stageTot>=170){grade='花 火 師'; gc='#ffcc44';gsub='一流の腕前！　会場が沸いた';}
  else if(stageTot>=120){grade='上　級';  gc='#88ccff';gsub='かなりの腕前！　頂点に近い';}
  else if(stageTot>=80) {grade='中　級';  gc='#77ee99';gsub='まずまず！　タイミングを磨こう';}
  else if(stageTot>=40) {grade='初心者';  gc='#aacc88';gsub='頂点でタップを意識しよう';}
  else                  {grade='修行中';  gc='#aaa';   gsub='リングが出たらタップ！';}
  const hasFinale=finaleShots.length>0;
  const hasFrenzy=frenzyTotalFired>0;
  const detailRows=stageScores.length+(hasFinale?1:0)+(hasFrenzy?1:0);
  const dstep=IS_MOBILE?26:30;
  const pw=Math.min(W*0.88,420),ph=IS_MOBILE?252+detailRows*dstep:H*0.46;
  const px=W/2-pw/2,py=IS_MOBILE?H*0.36:H*0.25;
  // Panel (custom draw for results — slightly open to show fireworks behind)
  X.save();X.shadowColor='rgba(255,160,0,0.6)';X.shadowBlur=26;
  X.fillStyle='rgba(2,3,18,0.84)';X.strokeStyle='rgba(255,205,60,0.85)';X.lineWidth=1.8;
  X.beginPath();X.roundRect(px,py,pw,ph,10);X.fill();X.stroke();X.restore();
  X.fillStyle='rgba(255,185,0,0.10)';X.beginPath();X.roundRect(px+2,py+2,pw-4,34,8);X.fill();
  txt('最 終 結 果',px+pw/2,py+18,IS_MOBILE?15:13,'#ffcc44','center',6);
  // Record / label
  if(newRecord){
    const rp=0.65+0.35*Math.abs(Math.sin(fr*0.14));
    X.globalAlpha=rp;txt('★ 新記録達成！',W/2,py+47,fs(0.03,18),'#ffdd44','center',10);X.globalAlpha=1;
  }else{
    txt('競技終了',W/2,py+47,fs(0.028,15),'rgba(255,210,130,0.8)','center',4);
  }
  // Grade — large and prominent
  txt(grade,W/2,py+92,fs(0.105,52),gc,'center',18);
  txt(gsub,W/2,py+134,fs(0.04,18),gc,'center',4);
  // Divider
  X.globalAlpha=0.40;X.fillStyle='rgba(255,205,50,1)';
  X.fillRect(px+22,py+152,pw-44,1);X.globalAlpha=1;
  // Total score — prominent
  txt(`${stageTot} 点`,W/2,py+177,fs(0.075,34),'rgba(255,245,160,0.96)','center',10);
  // Stage breakdown — compact
  stageScores.forEach((ss,i)=>{
    txt(`${STAGE_CFG[i].label}　${ss.avg}点`,W/2,py+212+i*dstep,fs(0.04,16),'rgba(205,185,130,0.92)');
  });
  if(hasFinale){
    const favg=Math.round(finaleShots.reduce((a,s)=>a+s.total,0)/finaleShots.length);
    txt(`大フィナーレ　${favg}点`,W/2,py+212+stageScores.length*dstep,fs(0.04,16),'rgba(170,215,255,0.92)');
  }
  if(hasFrenzy){
    const fRow=stageScores.length+(hasFinale?1:0);
    txt(`連打クライマックス　${frenzyTotalFired}発`,W/2,py+212+fRow*dstep,fs(0.04,16),'rgba(255,140,60,0.92)');
  } else if(stageTot<220){
    // 未解放時ヒント
    const fRow=stageScores.length+(hasFinale?1:0);
    txt('花火名人以上で連打クライマックス解放！',W/2,py+212+fRow*dstep,fs(0.032,14),'rgba(160,140,90,0.55)');
  }
  // Tap prompt just below card
  X.globalAlpha=0.5+0.5*Math.abs(Math.sin(fr*0.065));
  const _rpHint=replayLog.length>0?
    (IS_MOBILE?'▶ タップでリプレイ':'▶ タップ / スペースでリプレイ'):
    (IS_MOBILE?'タップでタイトルへ':'タップ / スペースでタイトルへ');
  txt(_rpHint,W/2,IS_MOBILE?py+232+detailRows*dstep:py+ph+36,fs(0.05,20),'rgba(255,225,155,0.95)');
  X.globalAlpha=1;
}

function uiHeader(){
  if(!['LAUNCHING','WAITING','EXPLODING','SCORING'].includes(state))return;
  txt(`${STAGE_CFG[stageIdx].label}　${STAGE_CFG[stageIdx].sub}`,W/2,H*0.04,fs(0.02,15),'rgba(195,175,125,0.6)');
  if(stageScores.length>0){
    const pv=stageScores.map((s,i)=>`${i+1}回:${s.avg}点`).join('　');
    txt(pv,W/2,H*0.075,fs(0.016,12),'rgba(165,145,95,0.5)');
  }
}

function spawnTitleFw(){
  fws.push(new Firework(W*0.12+Math.random()*W*0.76,H*0.1+Math.random()*H*0.32,
    0,FW_TYPES[~~(Math.random()*FW_TYPES.length)].id,~~(Math.random()*2)+1));
}

// ── Main loop ──────────────────────────────────────────────────
function loop(){
  fr++;
  if(state==='FINALE'||state==='FRENZY')recordingFrame++;
  drawSky();drawBGStars();drawMoon();drawCity();drawCrowd();

  const doShake=shakeAmt>0.3;
  if(doShake){X.save();X.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt*0.5);shakeAmt*=0.82;}

  updateDrawSparkles();

  // Light bursts
  lightBursts.forEach(lb=>lb.update());
  lightBursts.forEach(lb=>lb.draw());
  lightBursts=lightBursts.filter(lb=>!lb.dead);

  // Fireworks
  fws.forEach(fw=>fw.update());
  ptCount=fws.reduce((s,fw)=>s+fw.stars.length,0);
  gHeavy=ptCount>(IS_MOBILE?500:1800);
  fws.forEach(fw=>fw.draw());
  fws=fws.filter(fw=>!fw.done);

  // Smokes
  smokes.forEach(s=>{s.update();s.draw();});smokes=smokes.filter(s=>!s.dead);
  // Crowd reactions
  crowdReacts.forEach(p=>{p.y+=p.vy;p.t--;
    X.globalAlpha=p.t<20?p.t/20:Math.min(1,(100-p.t)/10);
    txt(p.txt,p.x,p.y,fs(0.04,24),p.col,'center',7);});
  crowdReacts=crowdReacts.filter(p=>p.t>0);X.globalAlpha=1;

  // Combo popups
  comboPops.forEach(p=>{p.y-=0.55;p.t--;
    X.globalAlpha=p.t<18?p.t/18:Math.min(1,(85-p.t)/8+0.1);
    txt(p.txt,p.x,p.y,p.sz||Math.min(W*0.035,24),p.col,'center',8);});
  comboPops=comboPops.filter(p=>p.t>0);X.globalAlpha=1;

  // Competition rockets
  rockets.forEach(r=>{
    if(r.exploded)return;
    const wasB=r.launched&&r.offset<0;
    r.update();
    if(r.launched&&wasB&&r.offset>=0)peakFlash=22;
    r.draw();
    if(state==='WAITING'&&r.launched&&!r.exploded&&r.offset>38)onRocketExplode(r);
  });

  // Finale rockets
  if(state==='FINALE'){
    finaleRockets.forEach(r=>r.update());
    // Grand finale closing shot: auto-detonate exactly at peak
    finaleRockets.forEach(r=>{
      if(r.grand&&r.started&&!r.exploded&&r.offset>=0){
        r.exploded=true;r.dead=true;
        fws.push(new Firework(r.x,r.y,0,'kiku',3));
        replayLog.push({t:recordingFrame,x:r.x,y:r.y,typeId:'kiku',rings:3,sc:100,grand:true});
        lightBursts.push(new LightBurst(r.x,r.y,'kiku'));
        colorFlash=50;colorFlashCol='#ffcc44';
        shakeAmt=Math.max(shakeAmt,22);skyGlow=1;crowdCheer=100;
        if(boomCd<=0){playBoom(5.5);boomCd=14;}
        playCrackle();
      }
    });
    finaleRockets.forEach(r=>r.draw());
    finaleRockets=finaleRockets.filter(r=>!r.dead);
  }

  // Frenzy rockets
  if(state==='FRENZY'){
    frenzyRockets.forEach(r=>r.update());
    frenzyRockets.forEach(r=>{if(!r.exploded&&r.started&&r.offset>45)explodeFrenzyRocket(r);});
    frenzyRockets.forEach(r=>r.draw());
    frenzyRockets=frenzyRockets.filter(r=>!r.dead);
  }

  if(doShake)X.restore();

  if(state==='LAUNCHING'){launchT--;if(launchT<=0)doLaunch();}
  if(state==='TITLE'||state==='RESULTS'){titleT++;if(titleT%110===0){spawnTitleFw();if(Math.random()<0.45)spawnTitleFw();}}

  uiHeader();
  switch(state){
    case'TITLE':       uiTitle();      break;
    case'LAUNCHING':   uiLaunching();  break;
    case'WAITING':     uiWaiting();    break;
    case'EXPLODING':   uiExploding();  break;
    case'SCORING':     uiScoring();    break;
    case'FINALE_INTRO': uiFinaleIntro(); break;
    case'FINALE':       uiFinale();      break;
    case'FRENZY_INTRO': uiFrenzyIntro(); break;
    case'FRENZY':       uiFrenzy();      break;
    case'RESULTS':      uiResults();     break;
    case'REPLAY':       uiReplay();      break;
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
